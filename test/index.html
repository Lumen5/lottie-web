<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <style>
        body, html{
            background-color:#fff;
            margin: 0px;
            overflow-x: hidden;
            overflow-y: auto;
            width: 100%;
            height: 100%;
        }

        #lottie{
            background-color:#fff;
            width:100%;
            height:100%;
            display:block;
            overflow: hidden;
            transform: translate3d(0,0,0);
            pointer-events: none;
            /*display:none;*/
        }

    </style>
    <script src="/lottie.min.js" ></script>


</head>
<body>
<div id="lottie"></div>
<script>
    const buildRenderSettings = (searchParams) => {
        const defaultValues = {
            path: '/test/animations/adrock.json',
            renderer: 'svg',
        };
        searchParams.forEach((value, key) => {
            defaultValues[key] = value;
        });

        return defaultValues;
    };
</script>
<script>
    const submitAndWaitForResponse = (currentFrame, isLast) => (
    new Promise((resolve) => {
        window.onMessageReceivedEvent({
            currentFrame,
            isLast,
        });
        resolve();
    })
    );
</script>
<script>
    const waitContinueCommand = () => {
        return new Promise((resolve) => {
            window.continueExecution = resolve;
        })
    }
</script>
<script>

    window.startProcess = () => {
        const url = new URL(window.location);
        const settings = buildRenderSettings(url.searchParams)
        const container = document.getElementById('lottie');
        if (settings.background) {
            container.style.background = settings.background;
        }
        const requestedFrames = settings.frames
            ? settings.frames.split(',').map((value) => Number(value)).filter((value) => !Number.isNaN(value))
            : null;
        const animation = lottie.loadAnimation({
            container: container,
            path: settings.path,
            autoplay: false,
            loop: false,
            renderer: settings.renderer,
        })
        animation.addEventListener('DOMLoaded', async () => {
            window.onAnimationLoaded();
            try {
                const totalFrames = animation.totalFrames;
                const sequence = requestedFrames && requestedFrames.length
                    ? requestedFrames
                    : Array.from({length: totalFrames + 1}, (_, idx) => idx);
                for (let i = 0; i < sequence.length; i += 1) {
                    const frame = sequence[i];
                    await waitContinueCommand();
                    animation.goToAndStop(frame, true);
                    await submitAndWaitForResponse(
                        frame,
                        i === sequence.length - 1,
                    );
                }
            } catch (error) {
                console.log('ERROR', error.message);
            }
        })
    }
    // window.startProcess();
</script>

</body>
</html>
