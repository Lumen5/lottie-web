<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <style>
        body, html{
            background-color:#fff;
            margin: 0px;
            overflow-x: hidden;
            overflow-y: auto;
            width: 100%;
            height: 100%;
        }

        #lottie{
            background-color:#fff;
            width:100%;
            height:100%;
            display:block;
            overflow: hidden;
            transform: translate3d(0,0,0);
            pointer-events: none;
            /*display:none;*/
        }

    </style>
    <script src="/lottie.min.js" ></script>


</head>
<body>
<div id="lottie"></div>
<script>
    const buildRenderSettings = (searchParams) => {
        const defaultValues = {
            path: '/test/animations/adrock.json',
            renderer: 'svg',
        };
        searchParams.forEach((value, key) => {
            defaultValues[key] = value;
        });

        return defaultValues;
    };
</script>
<script>
    const submitAndWaitForResponse = (currentFrame, isLast) => (
    new Promise((resolve) => {
        window.onMessageReceivedEvent({
            currentFrame,
            isLast,
        });
        resolve();
    })
    );
</script>
<script>
    const waitContinueCommand = () => {
        return new Promise((resolve) => {
            window.continueExecution = resolve;
        })
    }
</script>
<script>

    window.startProcess = () => {
        const url = new URL(window.location);
        const settings = buildRenderSettings(url.searchParams)
        const animation = lottie.loadAnimation({
            container: document.getElementById('lottie'),
            path: settings.path,
            autoplay: false,
            loop: false,
            renderer: settings.renderer,
        })
        animation.addEventListener('DOMLoaded', async () => {
            window.onAnimationLoaded();
            try {
                // If the test config provides an explicit list of frames,
                // only screenshot those frames instead of every frame in the
                // animation.  Frames are passed as a comma-separated query
                // param (e.g. ?frames=0,30,60).
                const explicitFrames = (settings.frames || '')
                    .split(',')
                    .map((s) => s.trim())
                    .filter((s) => s.length)
                    .map((s) => Number(s))
                    .filter((n) => Number.isFinite(n));
                const totalFrames = animation.totalFrames;
                const framesToRender = explicitFrames.length
                    ? explicitFrames
                    : Array.from({ length: totalFrames + 1 }, (_, i) => i);

                for (let i = 0; i < framesToRender.length; i += 1) {
                    const currentFrame = framesToRender[i];
                    const isLast = i === framesToRender.length - 1;
                    await waitContinueCommand();
                    animation.goToAndStop(currentFrame, true);
                    await submitAndWaitForResponse(currentFrame, isLast);
                }
            } catch (error) {
                console.log('ERROR', error.message);
            }
        })
    }
    // window.startProcess();
</script>

</body>
</html>
