name: Update Screenshots

on:
  workflow_dispatch:  # Select branch in GitHub UI when running

permissions:
  contents: write

jobs:
  update_screenshots:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18
    - run: npm install
    - run: npm run build
    - run: npm run test:create
    - name: Commit screenshots
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add screenshots/create
        git commit -m "Update baseline screenshots" || echo "No changes to commit"
        git push
